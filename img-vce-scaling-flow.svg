<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 634" role="img" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
<title>How VCE scaling turns your result into an ATAR</title>
<text x="320.0" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#1E3A8A">How VCE scaling becomes your ATAR</text>
<rect x="40.0" y="64" width="560" height="78" rx="12" fill="#1E3A8A"/>
<text x="320.0" y="98" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">Your study score</text>
<text x="320.0" y="122" text-anchor="middle" font-size="14" fill="#e5edff">out of 50, in each study</text>
<line x1="320.0" y1="146" x2="320.0" y2="168" stroke="#F97316" stroke-width="3"/>
<path d="M313.0,166 L327.0,166 L320.0,175 Z" fill="#F97316"/>
<rect x="40.0" y="176" width="560" height="78" rx="12" fill="#F97316"/>
<text x="320.0" y="210" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">VTAC scaling</text>
<text x="320.0" y="234" text-anchor="middle" font-size="14" fill="#e5edff">your score is scaled against the whole cohort</text>
<line x1="320.0" y1="258" x2="320.0" y2="280" stroke="#F97316" stroke-width="3"/>
<path d="M313.0,278 L327.0,278 L320.0,287 Z" fill="#F97316"/>
<rect x="40.0" y="288" width="560" height="78" rx="12" fill="#1E40AF"/>
<text x="320.0" y="322" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">Your scaled score</text>
<text x="320.0" y="346" text-anchor="middle" font-size="14" fill="#e5edff">reflects how strong your subject cohort was</text>
<line x1="320.0" y1="370" x2="320.0" y2="392" stroke="#F97316" stroke-width="3"/>
<path d="M313.0,390 L327.0,390 L320.0,399 Z" fill="#F97316"/>
<rect x="40.0" y="400" width="560" height="78" rx="12" fill="#1E3A8A"/>
<text x="320.0" y="434" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">Aggregate</text>
<text x="320.0" y="458" text-anchor="middle" font-size="14" fill="#e5edff">English + your best 3, plus 10% of the 5th and 6th</text>
<line x1="320.0" y1="482" x2="320.0" y2="504" stroke="#F97316" stroke-width="3"/>
<path d="M313.0,502 L327.0,502 L320.0,511 Z" fill="#F97316"/>
<rect x="40.0" y="512" width="560" height="78" rx="12" fill="#F97316"/>
<text x="320.0" y="546" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">Your ATAR</text>
<text x="320.0" y="570" text-anchor="middle" font-size="14" fill="#e5edff">a rank from 0 to 99.95, not a score</text>
</svg>